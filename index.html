<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>القرآن الكريم</title>

<style>
body {
    margin: 0;
    font-family: "Amiri", serif;
    background: #0f172a;
    color: white;
    display: flex;
    height: 100vh;
    overflow: hidden;
    flex-direction: row-reverse;
}

/* الشريط الجانبي */
.sidebar {
    width: 250px;
    background: #1e293b;
    overflow-y: auto;
    border-left: 1px solid #334155;
}

.sidebar h2 {
    text-align: center;
    padding: 15px;
    border-bottom: 1px solid #334155;
}

.sidebar #juzList {
    padding-bottom: 770px;
}

#ajza {
    cursor: pointer;
}

.juz {
    padding: 12px;
    cursor: pointer;
    border-bottom: 1px solid #334155;
    transition: 0.2s;
}

.juz:hover {
    background: #334155;
}

.juz.active {
    background-color: #2B5278;
}


/* منطقة الرسائل */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.message {
    background: #2B5278;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
    max-width: 600px;
    line-height: 2;
    font-size: var(--font-size, 20px);

    position: relative;
    left: 343px;
    direction: rtl;
}

.page-number {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
}

#time {
    padding: 15px;
    border-top: 1px solid #334155;
    position: fixed;
    bottom: 0;
    right: 0;
}

#range-size {
    padding:15px;
    border-bottom:1px solid #334155;
    position: fixed;
    top: 0;
    right: 0;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2 id="ajza">الأجزاء</h2>
    <div id="juzList"></div>
</div>

<div id="range-size">
    <div style="margin-bottom:8px;">حجم الخط: <span id="fontValue">20</span></div>
    
    <input 
        type="range" 
        id="fontSlider"
        min="16" 
        max="40" 
        step="1" 
        value="20"
        style="width:100%;"
    >
</div>

<h1 id="time">00:00</h1>

<div dir="ltr" class="chat" id="chat"></div>

<script>
let pagesData, quranData;
let timerInterval; // لتخزين interval
let seconds = 0;   // عدد الثواني اللي عدت

let ajzaElement = document.getElementById("ajza");
let juzList = document.querySelector("#juzList");
ajzaElement.onclick = () => {
    Array.from(juzList.children)
         .reverse()
         .forEach(child => juzList.appendChild(child));
    
    if(localStorage.getItem("reverse") == "true") {
        localStorage.setItem("reverse", "false");
    } else {
        localStorage.setItem("reverse", "true");
    }
}

if(!localStorage.getItem("active-juz")) {
    localStorage.setItem("active-juz", 1);
}

if(!localStorage.getItem("reverse")) {
    localStorage.setItem("reverse", "false");
}

async function loadData() {
    pagesData = await fetch("./القرآن كتابة/pages.json").then(r => r.json());
    quranData = await fetch("./القرآن كتابة/whole_quran_tashkeel.json").then(r => r.json());
    buildSidebar();
    active_juz(parseInt(localStorage.getItem("active-juz")));
}

function buildSidebar() {
    const juzList = document.getElementById("juzList");

    for (let i = 1; i <= 30; i++) {
        let div = document.createElement("div");
        div.className = "juz";
        div.dataset.juz = i;
        div.innerText = "الجزء " + i;
        div.onclick = function () {
            active_juz(i);
        };

        juzList.appendChild(div);
    }

    if(localStorage.getItem("reverse") === "true") {
        Array.from(juzList.children)
             .reverse()
             .forEach(child => juzList.appendChild(child));
    }
}

function active_juz(num) {
    localStorage.setItem("active-juz", num);

    const juzElements = document.querySelectorAll(".juz");
    juzElements.forEach(el => {
        el.classList.remove("active");
    });

    const activeJuz = document.querySelector(`.juz[data-juz="${num}"]`);
    if (activeJuz) {
        activeJuz.classList.add("active");
    }

    if (num === 1) {
        loadJuz(1, 21);
    } else if (num === 30) {
        loadJuz(582, 604);
    } else {
        loadJuz((num - 1) * 20 + 2, (num - 1) * 20 + 21);
    }
}

function loadJuz(start, end) {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    for (let p = start; p <= end; p++) {
        chat.appendChild(createPageMessage(p));
    }

    chat.scrollTop = 0;

    // إعادة ضبط الساعة
    clearInterval(timerInterval);
    seconds = 0;
    document.getElementById("time").textContent = "00:00";

    // شغل الساعة
    timerInterval = setInterval(updateClock, 1000);

}

function updateClock() {
    seconds++;
    let hrs = Math.floor(seconds / 3600);
    let mins = Math.floor((seconds % 3600) / 60);
    let secs = seconds % 60;

    let formatted;
    if (hrs > 0) {
        // ساعة أو أكتر → HH:MM:SS
        formatted = 
            String(hrs).padStart(2, '0') + ":" +
            String(mins).padStart(2, '0') + ":" +
            String(secs).padStart(2, '0');
    } else {
        // أقل من ساعة → MM:SS
        formatted = 
            String(mins).padStart(2, '0') + ":" +
            String(secs).padStart(2, '0');
    }

    document.getElementById("time").textContent = formatted;
}

function createPageMessage(pageNumber) {
    let page = pagesData[pageNumber - 1];
    let text = "";

    if (page.from_sura === page.to_sura) {
        text += getAyat(page.from_sura, page.from_ayah, page.to_ayah);
    } else {
        let suras = Object.keys(quranData);
        let startIndex = suras.indexOf(page.from_sura);
        let endIndex = suras.indexOf(page.to_sura);

        for (let i = startIndex; i <= endIndex; i++) {
            let sura = suras[i];

            if (i === startIndex)
                text += getAyat(sura, page.from_ayah, quranData[sura].length);
            else if (i === endIndex)
                text += getAyat(sura, 1, page.to_ayah);
            else
                text += getAyat(sura, 1, quranData[sura].length);
        }
    }

    let div = document.createElement("div");
    div.className = "message";
    div.innerHTML = text + `<div class="page-number">صفحة ${pageNumber}</div>`;

    return div;
}

function getAyat(sura, from, to) {
    return "{ "
        + quranData[sura]
        .slice(from - 1, to)
        .join(" ")
        .replace(/﴿/g, "(")
        .replace(/﴾/g, ")")
        + " }"
        + "<br>"
        + `[سورة ${sura}: ${to_arabic_num(from)}-${to_arabic_num(to)}]`
        + "<br><br>";
}

function to_arabic_num(num) {
    num = String(num);

    let nums = ["١", "٢", "٣", "٤", "٥", "٦", "٧", "٨", "٩", "٠"];
    let en = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"];

    for (let i = 0; i < 10; i++) {
        num = num.replaceAll(en[i], nums[i]);
    }

    return num;
}

const slider = document.getElementById("fontSlider");
const fontValue = document.getElementById("fontValue");

// تحميل القيمة المحفوظة
let savedSize = localStorage.getItem("quranFontSize");
if (savedSize) {
    document.documentElement.style.setProperty("--font-size", savedSize + "px");
    slider.value = savedSize;
    fontValue.textContent = savedSize;
}

// عند تغيير الحجم
slider.addEventListener("input", function () {
    let size = this.value;
    document.documentElement.style.setProperty("--font-size", size + "px");
    fontValue.textContent = size;
    localStorage.setItem("quranFontSize", size);
});

loadData();
</script>
</body>
</html>
