<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>القرآن الكريم</title>

<style>
body {
    margin: 0;
    font-family: "Amiri", serif;
    background: #0f172a;
    color: white;
    display: flex;
    height: 100vh;
    overflow: hidden;
    flex-direction: row-reverse;
}

/* الشريط الجانبي */
.sidebar {
    width: 250px;
    background: #1e293b;
    overflow-y: auto;
    border-left: 1px solid #334155;
}

.sidebar h2 {
    text-align: center;
    padding: 15px;
    border-bottom: 1px solid #334155;
}

.juz {
    padding: 12px;
    cursor: pointer;
    border-bottom: 1px solid #334155;
    transition: 0.2s;
}

.juz:hover {
    background: #334155;
}

/* منطقة الرسائل */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.message {
    background: #2B5278;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
    max-width: 600px;
    line-height: 2;
    font-size: var(--font-size, 20px);

    position: relative;
    left: 343px;
    direction: rtl;
}

.page-number {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>الأجزاء</h2>
    <div id="juzList"></div>
    <div style="padding:15px; border-bottom:1px solid #334155; position: fixed; top: 0; right: 0;">
    <div style="margin-bottom:8px;">حجم الخط: <span id="fontValue">20</span></div>
    <input 
        type="range" 
        id="fontSlider"
        min="16" 
        max="40" 
        step="1" 
        value="20"
        style="width:100%;"
    >
    </div>
</div>

<div dir="ltr" class="chat" id="chat"></div>

<script>
let pagesData, quranData;

async function loadData() {
    pagesData = await fetch("./القرآن كتابة/pages.json").then(r => r.json());
    quranData = await fetch("./القرآن كتابة/whole_quran_tashkeel.json").then(r => r.json());
    buildSidebar();
}

function buildSidebar() {
    const juzList = document.getElementById("juzList");

    let startPage = 1;

    for (let i = 1; i <= 30; i++) {
        let pageCount;

        if (i === 1) pageCount = 21;
        else if (i === 30) pageCount = 23;
        else pageCount = 20;

        let endPage = startPage + pageCount - 1;

        // نخزن القيم قبل ما تتغير
        let s = startPage;
        let e = endPage;

        let div = document.createElement("div");
        div.className = "juz";
        div.innerText = "الجزء " + i;
        div.onclick = function () {
            loadJuz(s, e);
        };

        if (i === 1) loadJuz(s, e);

        juzList.appendChild(div);

        startPage = endPage + 1;
    }
}

function loadJuz(start, end) {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    for (let p = start; p <= end; p++) {
        chat.appendChild(createPageMessage(p));
    }

    chat.scrollTop = 0;
}

function createPageMessage(pageNumber) {
    let page = pagesData[pageNumber - 1];
    let text = "";

    if (page.from_sura === page.to_sura) {
        text += getAyat(page.from_sura, page.from_ayah, page.to_ayah);
    } else {
        let suras = Object.keys(quranData);
        let startIndex = suras.indexOf(page.from_sura);
        let endIndex = suras.indexOf(page.to_sura);

        for (let i = startIndex; i <= endIndex; i++) {
            let sura = suras[i];

            if (i === startIndex)
                text += getAyat(sura, page.from_ayah, quranData[sura].length);
            else if (i === endIndex)
                text += getAyat(sura, 1, page.to_ayah);
            else
                text += getAyat(sura, 1, quranData[sura].length);
        }
    }

    let div = document.createElement("div");
    div.className = "message";
    div.innerHTML = text + `<div class="page-number">صفحة ${pageNumber}</div>`;

    return div;
}

function getAyat(sura, from, to) {
    return quranData[sura]
        .slice(from - 1, to)
        .join(" ")
        .replace(/﴿/g, "(")
        .replace(/﴾/g, ")")
        + "<br><br>";
}

loadData();

const slider = document.getElementById("fontSlider");
const fontValue = document.getElementById("fontValue");

// تحميل القيمة المحفوظة
let savedSize = localStorage.getItem("quranFontSize");
if (savedSize) {
    document.documentElement.style.setProperty("--font-size", savedSize + "px");
    slider.value = savedSize;
    fontValue.textContent = savedSize;
}

// عند تغيير الحجم
slider.addEventListener("input", function () {
    let size = this.value;
    document.documentElement.style.setProperty("--font-size", size + "px");
    fontValue.textContent = size;
    localStorage.setItem("quranFontSize", size);
});
</script>

</body>
</html>
